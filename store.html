<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر المتابعين - Ali Yahya</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050511;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-light); 
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #2a1b4d 0%, var(--bg-color) 70%);
            overflow-x: hidden;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        
        /* شريط التنقل */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 40px; }
        .back-btn {
            background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-light);
            text-decoration: none; padding: 10px 24px; border-radius: 30px; font-weight: 600;
            backdrop-filter: blur(10px); transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateX(5px); }
        html[dir="ltr"] .back-btn:hover { transform: translateX(-5px); }

        /* العنوان */
        .header { text-align: center; margin-bottom: 50px; animation: fadeInDown 0.8s ease; }
        .header h1 { 
            font-size: 3rem; font-weight: 800; margin-bottom: 10px;
            background: linear-gradient(to right, #ec4899, #8b5cf6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 1.2rem; color: var(--text-muted); }

        /* البطاقات */
        .packages-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px; margin-bottom: 50px; align-items: center;
        }
        
        .card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 40px 30px; text-align: center;
            backdrop-filter: blur(20px); transition: all 0.4s ease;
            position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: var(--card-gradient, linear-gradient(90deg, #3b82f6, #06b6d4));
        }
        .card:hover { transform: translateY(-10px); border-color: rgba(255, 255, 255, 0.2); box-shadow: 0 20px 40px var(--card-glow); }
        
        .card.popular {
            transform: scale(1.05); background: rgba(236, 72, 153, 0.05);
            border-color: rgba(236, 72, 153, 0.3); box-shadow: 0 0 30px rgba(236, 72, 153, 0.15);
        }
        .card.popular:hover { transform: scale(1.05) translateY(-10px); box-shadow: 0 20px 50px rgba(236, 72, 153, 0.3); }
        
        .popular-badge {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(45deg, #ec4899, #8b5cf6); padding: 5px 15px;
            border-radius: 20px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(236, 72, 153, 0.4);
        }

        .card-icon { font-size: 3.5rem; margin-bottom: 20px; background: var(--card-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 10px; }
        .card-price { font-size: 2.8rem; font-weight: 800; color: #fff; margin-bottom: 30px; }
        
        .features-list { list-style: none; margin-bottom: 30px; text-align: right; }
        html[dir="ltr"] .features-list { text-align: left; }
        .features-list li { margin-bottom: 12px; color: #cbd5e1; font-size: 1rem; display: flex; align-items: center; gap: 10px; }
        .features-list li i { color: #10b981; font-size: 1.1rem; }

        .buy-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 15px; border-radius: 16px; text-decoration: none;
            color: #fff; font-size: 1.1rem; font-weight: 700; transition: all 0.3s ease;
            background: var(--card-gradient); box-shadow: 0 10px 20px var(--card-glow);
        }
        .buy-btn:hover { filter: brightness(1.2); }

        /* بانر الملاحظات السفلي (VIP) */
        .info-banner {
            background: linear-gradient(135deg, rgba(20, 20, 35, 0.8), rgba(10, 10, 20, 0.9));
            border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 20px; padding: 30px;
            text-align: center; position: relative; overflow: hidden; margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 1s ease;
        }
        .info-banner::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 60%);
            pointer-events: none;
        }
        .info-banner h3 { color: #fbbf24; font-size: 1.5rem; margin-bottom: 15px; }
        .info-banner p { font-size: 1.1rem; color: #e2e8f0; margin-bottom: 10px; line-height: 1.8; }
        .info-banner p strong { color: #fff; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 6px;}

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* للموبايل */
        @media (max-width: 768px) {
            .header h1 { font-size: 2.2rem; }
            .card.popular { transform: scale(1); }
            .card.popular:hover { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

<div class="container">
    <nav class="navbar">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-right"></i> <span data-i18n="back_btn">العودة</span></a>
    </nav>

    <div class="header">
        <h1 data-i18n="store_title">متجر الدعم والتسويق</h1>
        <p data-i18n="store_subtitle">اختر باقة الإنستجرام المناسبة لك</p>
    </div>

    <!-- حاوية البطاقات -->
    <div class="packages-grid" id="packages-container"></div>

    <!-- قسم الملاحظات VIP -->
    <div class="info-banner">
        <h3 data-i18n="note_title">خدمات إضافية VIP 💎</h3>
        <p data-i18n="note_500k">نوفر كميات ضخمة تصل إلى <strong>500K متابع</strong> بأسعار تنافسية.</p>
        <p data-i18n="note_real">يتوفر لدينا متابعين <strong>حقيقيين متفاعلين</strong>، وندعم جميع منصات التواصل الاجتماعي.</p>
    </div>
</div>

<script src="data.js"></script>
<script>
    // إعداد اللغة
    const currentLang = localStorage.getItem('lang') || 'ar';
    document.documentElement.lang = currentLang;
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    
    // ترجمة النصوص الثابتة
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[key]) el.innerHTML = translations[key][currentLang];
    });

    // دالة لتحويل أسماء الألوان إلى كود CSS (للتدرجات اللونية)
    const gradients = {
        "from-blue-500 to-cyan-400": "linear-gradient(135deg, #3b82f6, #22d3ee)",
        "from-pink-500 to-purple-500": "linear-gradient(135deg, #ec4899, #a855f7)",
        "from-amber-400 to-orange-500": "linear-gradient(135deg, #fbbf24, #f97316)"
    };

    // توليد باقات المتجر
    const container = document.getElementById('packages-container');
    
    storePackages.forEach((pkg, index) => {
        const featuresHtml = pkg.features[currentLang].map(f => `<li><i class="fa-solid fa-circle-check"></i> ${f}</li>`).join('');
        
        // رابط البوت (التوجيه المباشر)
        const botUrl = `https://telegram.me/djdtebot?start=${pkg.id}`;
        const gradientBg = gradients[pkg.color] || gradients["from-blue-500 to-cyan-400"];
        
        let popularBadge = '';
        if(pkg.popular) {
            popularBadge = `<div class="popular-badge">${currentLang === 'ar' ? 'الأكثر مبيعاً 🔥' : 'Best Seller 🔥'}</div>`;
        }

        // تحريك تدريجي للبطاقات (Animation delay)
        const delay = index * 0.2;

        const cardHtml = `
            <div class="card ${pkg.popular ? 'popular' : ''}" style="--card-gradient: ${gradientBg}; --card-glow: ${pkg.glow}; animation: fadeInUp 0.8s ease ${delay}s both;">
                ${popularBadge}
                <div class="card-icon"><i class="fa-solid ${pkg.icon}"></i></div>
                <h2 class="card-title">${pkg.title[currentLang]}</h2>
                <div class="card-price">${pkg.price[currentLang]}</div>
                <ul class="features-list">
                    ${featuresHtml}
                </ul>
                <a href="${botUrl}" target="_blank" class="buy-btn">
                    <i class="fa-brands fa-telegram"></i> ${translations.buy_btn[currentLang]}
                </a>
            </div>
        `;
        container.innerHTML += cardHtml;
    });
</script>
</body>
</html>
