<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر المتابعين - Ali Yahya</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=El+Messiri:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ink: #12131A;
            --card-bg: #1B1D27;
            --copper: #C9814E;
            --copper-deep: #8C4A2F;
            --teal: #34A79C;
            --gold: #BB9760;
            --paper: #F1E9D8;
            --text-main: #F3EFE6;
            --text-dim: #A79A85;
            --border-copper: rgba(201, 129, 78, 0.22);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--ink);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image:
                radial-gradient(circle at 10% 5%, rgba(201, 129, 78, 0.10), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(52, 167, 156, 0.08), transparent 45%);
            z-index: -1; pointer-events: none;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

        /* شريط التنقل */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 40px; }
        .back-btn {
            background: var(--card-bg); border: 1px solid var(--border-copper); color: var(--paper);
            text-decoration: none; padding: 10px 24px; border-radius: 30px; font-weight: 600;
            transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;
        }
        .back-btn:hover { background: var(--copper); color: var(--ink); transform: translateX(5px); }
        html[dir="ltr"] .back-btn:hover { transform: translateX(-5px); }

        /* العنوان */
        .header { text-align: center; margin-bottom: 50px; animation: fadeInDown 0.8s ease; }
        .header h1 {
            font-family: 'El Messiri', 'Cairo', sans-serif;
            font-size: 2.6rem; font-weight: 700; margin-bottom: 12px;
            background: linear-gradient(90deg, var(--paper), var(--copper));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 1.1rem; color: var(--text-dim); }

        /* شارات زوايا هندسية — نفس توقيع الصفحة الرئيسية */
        .plaque {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--border-copper);
            border-radius: 18px;
            background-image:
                linear-gradient(var(--copper), var(--copper)), linear-gradient(var(--copper), var(--copper)),
                linear-gradient(var(--copper), var(--copper)), linear-gradient(var(--copper), var(--copper)),
                linear-gradient(var(--copper), var(--copper)), linear-gradient(var(--copper), var(--copper)),
                linear-gradient(var(--copper), var(--copper)), linear-gradient(var(--copper), var(--copper));
            background-repeat: no-repeat;
            background-size: 14px 2px, 2px 14px, 14px 2px, 2px 14px, 14px 2px, 2px 14px, 14px 2px, 2px 14px;
            background-position:
                14px 14px, 14px 14px,
                calc(100% - 28px) 14px, calc(100% - 16px) 14px,
                14px calc(100% - 16px), 14px calc(100% - 28px),
                calc(100% - 28px) calc(100% - 16px), calc(100% - 16px) calc(100% - 28px);
        }

        /* البطاقات */
        .packages-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(min(300px, 100%), 1fr));
            gap: 28px; margin-bottom: 50px; align-items: center;
        }

        .card {
            padding: 40px 30px; text-align: center;
            transition: all 0.35s ease;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px var(--card-glow); }

        .card.popular {
            border-color: rgba(201, 129, 78, 0.45);
            box-shadow: 0 0 30px rgba(201, 129, 78, 0.12);
        }
        .card.popular:hover { box-shadow: 0 20px 45px rgba(201, 129, 78, 0.28); }

        .popular-badge {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(45deg, var(--copper), var(--gold)); color: var(--ink); padding: 5px 15px;
            border-radius: 20px; font-size: 0.85rem; font-weight: bold; letter-spacing: 0.5px;
        }

        .card-icon { font-size: 3rem; margin-bottom: 20px; color: var(--card-color); }
        .card-title { font-family: 'El Messiri', 'Cairo', sans-serif; font-size: 1.5rem; font-weight: 600; margin-bottom: 10px; }
        .card-price { font-family: 'JetBrains Mono', 'Cairo', sans-serif; font-size: 2.4rem; font-weight: 700; color: var(--paper); margin-bottom: 30px; }

        .features-list { list-style: none; margin-bottom: 30px; text-align: right; }
        html[dir="ltr"] .features-list { text-align: left; }
        .features-list li { margin-bottom: 12px; color: #cbc3b3; font-size: 1rem; display: flex; align-items: center; gap: 10px; }
        .features-list li i { color: var(--teal); font-size: 1.05rem; }

        .buy-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 15px; border-radius: 16px; text-decoration: none;
            color: var(--ink); font-size: 1.05rem; font-weight: 700; transition: all 0.3s ease;
            background: var(--card-gradient);
        }
        .buy-btn:hover { filter: brightness(1.1); }

        /* بانر VIP — بشكل شهادة/ختم */
        .info-banner {
            padding: 34px; text-align: center; position: relative; margin-top: 20px;
            animation: fadeInUp 0.9s ease;
        }
        .info-banner h3 { font-family: 'El Messiri', 'Cairo', sans-serif; color: var(--gold); font-size: 1.4rem; margin-bottom: 15px; font-weight: 600; }
        .info-banner p { font-size: 1.05rem; color: #E7E1D3; margin-bottom: 10px; line-height: 1.8; }
        .info-banner p strong { color: var(--paper); background: rgba(201, 129, 78, 0.15); padding: 2px 8px; border-radius: 6px; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
        }

        /* شاشات الهواتف الصغيرة جداً — لمنع أي قطع أو تجاوز للعرض */
        @media (max-width: 420px) {
            .container { padding: 20px 14px; }
            .card { padding: 32px 20px; }
            .card-price { font-size: 1.9rem; }
            .card-title { font-size: 1.3rem; }
            .header h1 { font-size: 1.7rem; }
            .header p { font-size: 1rem; }
            .info-banner { padding: 26px 18px; }
        }
    </style>
</head>
<body>

<div class="container">
    <nav class="navbar">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-right"></i> <span data-i18n="back_btn">العودة</span></a>
    </nav>

    <div class="header">
        <h1 data-i18n="store_title">متجر الدعم والتسويق</h1>
        <p data-i18n="store_subtitle">اختر باقة الإنستجرام المناسبة لك</p>
    </div>

    <!-- حاوية البطاقات -->
    <div class="packages-grid" id="packages-container"></div>

    <!-- قسم الملاحظات VIP -->
    <div class="info-banner plaque">
        <h3 data-i18n="note_title">خدمات إضافية VIP 💎</h3>
        <p data-i18n="note_500k">نوفر كميات ضخمة تصل إلى <strong>500K متابع</strong> بأسعار تنافسية.</p>
        <p data-i18n="note_real">يتوفر لدينا متابعين <strong>حقيقيين متفاعلين</strong>، وندعم جميع منصات التواصل الاجتماعي.</p>
    </div>
</div>

<script src="data.js"></script>
<script>
    // إعداد اللغة
    const currentLang = localStorage.getItem('lang') || 'ar';
    document.documentElement.lang = currentLang;
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

    // ترجمة النصوص الثابتة
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[key]) el.innerHTML = translations[key][currentLang];
    });

    // ألوان البطاقات — نفس منظومة النحاس/الفيروزي/الذهبي
    const gradients = {
        "from-blue-500 to-cyan-400": "linear-gradient(135deg, #34A79C, #1F6B63)",
        "from-pink-500 to-purple-500": "linear-gradient(135deg, #C9814E, #8C4A2F)",
        "from-amber-400 to-orange-500": "linear-gradient(135deg, #BB9760, #4A3B2A)"
    };
    const iconColors = {
        "from-blue-500 to-cyan-400": "#34A79C",
        "from-pink-500 to-purple-500": "#C9814E",
        "from-amber-400 to-orange-500": "#BB9760"
    };

    // توليد باقات المتجر
    const container = document.getElementById('packages-container');

    storePackages.forEach((pkg, index) => {
        const featuresHtml = pkg.features[currentLang].map(f => `<li><i class="fa-solid fa-circle-check"></i> ${f}</li>`).join('');

        // رابط البوت (التوجيه المباشر)
        const botUrl = `https://telegram.me/djdtebot?start=${pkg.id}`;
        const gradientBg = gradients[pkg.color] || gradients["from-blue-500 to-cyan-400"];
        const iconColor = iconColors[pkg.color] || iconColors["from-blue-500 to-cyan-400"];

        let popularBadge = '';
        if(pkg.popular) {
            popularBadge = `<div class="popular-badge">${currentLang === 'ar' ? 'الأكثر مبيعاً 🔥' : 'Best Seller 🔥'}</div>`;
        }

        // تحريك تدريجي للبطاقات (Animation delay)
        const delay = index * 0.15;

        const cardHtml = `
            <div class="card plaque ${pkg.popular ? 'popular' : ''}" style="--card-color: ${iconColor}; --card-gradient: ${gradientBg}; --card-glow: ${pkg.glow}; animation: fadeInUp 0.8s ease ${delay}s both;">
                ${popularBadge}
                <div class="card-icon"><i class="fa-solid ${pkg.icon}"></i></div>
                <h2 class="card-title">${pkg.title[currentLang]}</h2>
                <div class="card-price">${pkg.price[currentLang]}</div>
                <ul class="features-list">
                    ${featuresHtml}
                </ul>
                <a href="${botUrl}" target="_blank" class="buy-btn">
                    <i class="fa-brands fa-telegram"></i> ${translations.buy_btn[currentLang]}
                </a>
            </div>
        `;
        container.innerHTML += cardHtml;
    });
</script>
</body>
</html>
